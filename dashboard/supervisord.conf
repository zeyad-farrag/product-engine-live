[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:node]
command=node /app/dist/index.cjs
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=NODE_ENV="production"

[program:mysql-api]
command=/opt/venv/bin/uvicorn mysql-api:app --host 0.0.0.0 --port 8001
directory=/app/server
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
